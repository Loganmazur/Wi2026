    <!-- MOBILE MENU - delayed so React renders first -->

      window.addEventListener('load', function() {
        setTimeout(function() {
          var script = document.createElement('script');
          script.src = '/layout/scripts/jquery.mobilemenu.js';
          document.body.appendChild(script);
        }, 500);
      });
    </script>
